# mulham trader configuration

symbols:
  - "BTC"
  - "ETH"
  - "SOL"
  - "AVAX"

timeframes:
  - 1m
  - 5m
  - 15m
  - 1h
  - 4h

correlations: {}
  # To enable SMT divergence: "BTC": "ETH"  (fetches ETH candles alongside BTC scans)

scan_interval_seconds: 60

# Paper trading
paper_trading: true
paper_balance: 100000.0
per_trade_percent: 1.0
max_leverage: 25

# Optional agent layer
agent_enabled: false
